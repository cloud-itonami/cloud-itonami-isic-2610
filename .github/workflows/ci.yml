name: ci

# Kept correct and ready for when Actions are enabled on the org.
# Until then: run locally with `clojure -M:lint` and `clojure -M:dev:test`.
#
# Workspace layout: deps use :local/root to kotoba-lang/langgraph,
# kotoba-lang/robotics and kotoba-lang/langchain-store (public), plus
# kotoba-lang/langchain via the :dev alias override. CI reconstructs
# sibling paths. `test-cross-repo` (its own alias, needing a sibling
# cloud-itonami-isic-0729 checkout) is intentionally NOT run here --
# it stays out of the default `:test`/`:dev:test` alias for the same
# reason a casual fork of just this repo doesn't need it.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: "21" }
      - uses: DeLaGuardo/setup-clojure@13.0
        with: { cli: latest }
      - name: clj-kondo (errors fail the build)
        run: clojure -M:lint

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { path: orgs/cloud-itonami/cloud-itonami-isic-2610 }
      - uses: actions/checkout@v4
        with:
          repository: kotoba-lang/langgraph
          path: orgs/kotoba-lang/langgraph
      - uses: actions/checkout@v4
        with:
          repository: kotoba-lang/robotics
          path: orgs/kotoba-lang/robotics
      - uses: actions/checkout@v4
        with:
          repository: kotoba-lang/langchain-store
          path: orgs/kotoba-lang/langchain-store
      - uses: actions/checkout@v4
        with:
          repository: kotoba-lang/langchain
          path: orgs/kotoba-lang/langchain
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: "21" }
      - uses: DeLaGuardo/setup-clojure@13.0
        with: { cli: latest }
      - name: test (governor · store parity · export · phases · facts)
        working-directory: orgs/cloud-itonami/cloud-itonami-isic-2610
        run: clojure -M:dev:test
